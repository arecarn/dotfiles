---
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    env:
      COREHOST_ALLOW_SYMLINKS: 1
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y shellcheck
      - name: Install shellcheck (Windows)
        if: runner.os == 'Windows'
        run: choco install shellcheck
      - name: Enable symbolic links (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" ^
            /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f
          git config --global core.symlinks true
      - name: Install dependencies
        run: uv sync
      - name: Provision (headless)
        run: uv run invoke provision
      - name: Add cargo to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Lint
        run: uv run invoke lint
      # git config --global (above) creates ~/.gitconfig which conflicts
      # with dploy stowing git/.gitconfig to the same path
      - name: Clean conflicting dotfiles before stow (Windows)
        if: runner.os == 'Windows'
        run: |
          Remove-Item ~\.gitconfig -ErrorAction SilentlyContinue
          Remove-Item ~\.gitconfig_personal -ErrorAction SilentlyContinue
          if (Test-Path ~\.ssh) {
            Remove-Item ~\.ssh\* -ErrorAction SilentlyContinue
          }
          if (Test-Path ~\.config\git) {
            Remove-Item ~\.config\git -Recurse -ErrorAction SilentlyContinue
          }
      - name: Stow (test)
        run: uv run invoke stow

---
# Packages with the same name on both Debian and RedHat
common_packages:
  - coreutils
  - curl
  - gawk
  - git
  - htop
  - moreutils
  - ncdu
  - nodejs
  - npm
  - openssh-server
  - pandoc
  - picocom
  - shellcheck
  - tmux
  - tree
  - wget
  - xclip
  - zsh

# Packages with different names per OS family
os_family_packages:
  Debian:
    - firefox
    - python3
    - python3-dev
    - python3-pip
    - software-properties-common
    - ssh-askpass
    - unrar
    - vlc
  RedHat:
    - firefox
    - python3
    - python3-devel
    - python3-pip
    - openssh-askpass
    - unrar
    - vlc

# Python tools (installed via uv)
python_packages:
  - cmake
  - cmakelint
  - proselint
  - pylint

# JavaScript tools (installed via pnpm)
javascript_packages:
  - write-good

---
- name: Check if direnv is installed
  ansible.builtin.command:
    cmd: direnv version
  register: direnv_check
  changed_when: false
  failed_when: false

- name: Install direnv from GitHub releases
  when: direnv_check.rc != 0
  become: true
  ansible.builtin.get_url:
    url: >-
      https://github.com/direnv/direnv/releases/latest/download/direnv.linux-{{
        ansible_facts['architecture']
        | replace('x86_64', 'amd64')
        | replace('aarch64', 'arm64')
      }}
    dest: /usr/local/bin/direnv
    mode: "0755"

---
- name: Ensure pnpm is available (try Corepack first)
  when: javascript_packages | length > 0
  block:
    - name: Install Corepack via npm
      ansible.builtin.command:
        cmd: npm install -g --force corepack
      register: corepack_install
      changed_when: "'added' in corepack_install.stdout"
      become: "{{ not is_termux }}"

    - name: Enable Corepack
      ansible.builtin.command:
        cmd: corepack enable
      register: corepack_res
      ignore_errors: true
      become: "{{ not is_termux }}"

    - name: Fallback to npm install pnpm if Corepack fails
      ansible.builtin.command:
        cmd: npm install -g pnpm
      register: pnpm_install
      changed_when: "'added' in pnpm_install.stdout"
      when: corepack_res.failed
      become: "{{ not is_termux }}"

- name: Install global pnpm packages
  when: javascript_packages | length > 0
  vars:
    pnpm_bin_dir: "{{ lookup('env', 'HOME') }}/.local/share/pnpm"
  environment:
    PNPM_HOME: "{{ pnpm_bin_dir }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ pnpm_bin_dir }}"
  ansible.builtin.command:
    cmd: "pnpm add -g {{ item }}"
  loop: "{{ javascript_packages }}"
  register: pnpm_result
  changed_when: "'Already up to date' not in pnpm_result.stdout"

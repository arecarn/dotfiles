---
# RHEL: Enable EPEL and CodeReady Builder repositories
- name: Install EPEL release package (RHEL)
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Enable CodeReady Builder repository (RHEL)
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.command:
    cmd: >-
      dnf config-manager --set-enabled
      {{ (ansible_facts['distribution_major_version'] | int >= 10)
         | ternary('codeready-builder-for-rhel-'
         + ansible_facts['distribution_major_version']
         + '-x86_64-rpms', 'crb') }}
  changed_when: false

# Ubuntu: Add git PPA for latest version
- name: Add git PPA (Ubuntu)
  when: ansible_facts['distribution'] == "Ubuntu"
  ansible.builtin.apt_repository:
    repo: ppa:git-core/ppa
    state: present
    update_cache: true

# Ubuntu: Add NodeSource PPA for Node.js 22
- name: Add NodeSource Node.js 22 repository (Debian)
  when: ansible_facts['os_family'] == "Debian" and not is_termux
  ansible.builtin.shell:
    cmd: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 22 from NodeSource (Debian)
  when: ansible_facts['os_family'] == "Debian" and not is_termux
  ansible.builtin.apt:
    name: nodejs
    state: latest

---
# cargo/rustc from the distro are a bootstrap so rustup is available;
# the 'rustup default stable' task below then takes over toolchain management.
- name: Ensure cargo and rustc are installed (Debian/RedHat)
  ansible.builtin.package:
    name:
      - cargo
      - rustc
    state: present
  when: not is_termux

- name: Set rustup default toolchain to stable
  become: false
  ansible.builtin.command:
    cmd: rustup default stable
  register: rustup_default
  changed_when: "'unchanged' not in rustup_default.stderr"
  failed_when: false
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"

- name: Check if selene is already installed
  become: false
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/selene"
  register: selene_exists

- name: Install selene via cargo
  become: false
  ansible.builtin.command:
    cmd: "cargo install selene"
  when: not selene_exists.stat.exists
  register: cargo_install
  changed_when: cargo_install.rc == 0
  ignore_errors: true
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
